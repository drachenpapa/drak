name: Feature request
description: Suggest an idea for this project
title: "[FEAT] "
labels: ["enhancement"]
assignees:
  - drachenpapa
body:
  - type: markdown
    attributes:
      value: "Have an idea? We are happy to review scoped proposals."
  - type: markdown
    attributes:
      value: "Please read the [Contributing Guidelines](https://github.com/drachenpapa/drak/blob/main/CONTRIBUTING.md) before submitting a proposal."
  - type: markdown
    attributes:
      value: "Note: This project is feature-complete for gameplay. Gameplay feature requests are usually out of scope; bugfixes, docs, and maintenance improvements are preferred."
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
